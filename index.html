<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dad Tracker v2.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* Base Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e293b; /* A dark slate background to make the grey modules pop */
            color: #333;
            overflow-x: hidden;
        }

        /* Dashboard Container */
        #dashboard {
            display: none; 
            width: 100vw;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Dashboard Header */
        .header {
            text-align: center;
            background: white;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 800;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: max-content;
            margin: 0 auto 20px auto;
        }

        /* --- THE NEW GRID LAYOUT --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Module Styling */
        .module {
            background: #e1e6eb; /* Solid cool grey (removed transparency for older iPad performance) */
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
        }

        /* The Map Module spans all 3 columns */
        .map-module {
            grid-column: 1 / -1;
            padding: 0; /* Remove padding so map can go edge-to-edge */
            overflow: hidden;
        }

        /* The new Status Header inside the Map module */
        .map-header {
            padding: 15px 25px;
            background: #e1e6eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ccc;
        }

        #map-container {
            width: 100%;
            height: 400px; /* Fixed height for the map */
            background-color: #a3c9a8; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #4a6741;
            font-weight: bold;
        }

        .module-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #666;
            margin-bottom: 10px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 5px;
        }

        /* Specific Module Layouts */
        .status-text { font-size: 2rem; font-weight: 800; color: #005A9C; margin: 0; }
        .sub-text { font-size: 1rem; color: #555; margin: 0; }
        .date-text { font-size: 0.85rem; color: #666; font-style: italic; margin: 5px 0 0 0; }

        /* Polaroid Styling */
        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
            font-family: "Marker Felt", "Comic Sans MS", cursive;
            transform: rotate(-2deg);
            margin-top: auto; /* Pushes it to the bottom if module stretches */
        }
        .polaroid img { width: 100%; height: auto; background: #ccc; min-height: 150px; }

        /* Buttons */
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        .ack-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            background-color: #d0d5da;
            color: #333;
            transition: background 0.3s;
        }
        .ack-btn.seen { background-color: #4CAF50; color: white; }

        .send-msg-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            background-color: #005A9C;
            color: white;
        }

   /* Sleeps List */
        .sleeps-list { list-style: none; padding: 0; margin: 0; }
        .sleeps-list li {
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #ccc;
            padding: 8px 10px; /* Added slight padding for the row highlights */
        }
        .sleeps-list li:last-child { border-bottom: none; }
        .event-name { font-weight: 600; color: #333; }
        
        /* Normal Number Pill */
        .sleep-number { 
            font-weight: bold; 
            color: #333; /* Changed to black */
            font-size: 1.4rem; 
            background: #eaeff4; /* Cool grey background */
            padding: 2px 10px; 
            border-radius: 8px; 
        }

        /* The "TODAY!" Styles */
        .today-row {
            background-color: #e8f5e9; /* Light green row highlight */
            border-bottom: none !important;
            border-radius: 8px;
            box-shadow: inset 0 0 5px rgba(46, 125, 50, 0.1); /* Subtle inner glow */
        }
        .today-text {
            color: #2e7d32; /* Deep green text */
            background: #c8e6c9; /* Slightly darker green pill */
        }

        /* --- THE NEW SEND MESSAGE VIEW --- */
        #send-view {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: #1e293b; 
            z-index: 5000; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-y: auto;
        }

        .send-grid {
            display: flex; 
            gap: 20px; 
            max-width: 900px; 
            margin: 20px auto 0 auto;
        }

        .send-col {
            flex: 1; 
            background: #e1e6eb; 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center;
        }

        .push-btn {
            display: block; 
            width: 100%; 
            padding: 20px 15px; 
            margin-bottom: 15px;
            background: white; 
            border: 2px solid #ccc; 
            border-radius: 10px;
            font-size: 1.2rem; 
            font-weight: bold; 
            color: #333;
            cursor: pointer;
        }

        #btn-cancel-send {
            background: #d0d5da;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* Mobile Adjustments */
        @media (max-width: 767px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .send-grid { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="auth-screen"></div>

    <div id="dashboard">
        <div class="header">DAD TRACKER</div>
        
        <div class="dashboard-grid">
            
            <div class="module map-module" id="mod-sector">
                <div class="map-header">
                    <div>
                        <div class="module-title" style="border:none; margin-bottom:0;">Dad's Status</div>
                        <p class="status-text">Locating Dad</p>
                    </div>
                    <div style="text-align: right;">
                        <p class="sub-text">Loading...</p>
                        <p class="date-text"></p>
                    </div>
                </div>
                <div id="map-container">
                    [ MAP PLACEHOLDER ]
                </div>
            </div>

            <div class="module" id="mod-messages">
                <div class="module-title">Messages</div>
                <p id="message-text" style="font-size: 1.1rem; line-height: 1.4; flex-grow: 1;">Loading message...</p>
                <div class="btn-container">
                    <button class="ack-btn" id="btn-carter">Carter</button>
                    <button class="ack-btn" id="btn-barrett">Barrett</button>
                </div>
                <button class="send-msg-btn" id="btn-open-send">Send Dad a Message</button>
            </div>

            <div class="module" id="mod-sleeps">
                <div class="module-title">SLEEPS UNTIL...</div>
                <ul class="sleeps-list" id="sleeps-list-container">
                    <li><span class="event-name">Loading timer...</span></li>
                </ul>
            </div>

            <div class="module" id="mod-postcard">
                <div class="module-title">Dad's Latest Postcard</div>
                <div class="polaroid">
                    <img id="postcard-img" src="" style="width: 100%; height: auto; max-height: 180px; object-fit: cover; display: none; background: #ddd;" />
                    <div id="postcard-placeholder" style="width:100%; height:150px; background:#ddd; display: flex; align-items: center; justify-content: center; color: #888; font-family: sans-serif;">Awaiting Photo...</div> 
                    <p style="margin-top: 10px;">Wish you were here!</p>
                </div>
            </div>

        </div>
    </div>

    <div id="send-view">
        <div style="max-width: 900px; margin: 0 auto;">
            <button id="btn-cancel-send">← Back to Dashboard</button>
            <div class="header" style="margin: 0 auto;">SEND DAD A PING</div>
            
            <div class="send-grid">
                <div class="send-col">
                    <h2 style="margin-top: 0; color: #005A9C;">Carter</h2>
                    <button class="push-btn" data-son="Carter" data-msg="Miss you dad!">Miss you dad!</button>
                    <button class="push-btn" data-son="Carter" data-msg="Good morning, Dad!">Good morning, Dad!</button>
                    <button class="push-btn" data-son="Carter" data-msg="Send us a new pic!">Send us a new pic!</button>
                </div>
                
                <div class="send-col">
                    <h2 style="margin-top: 0; color: #005A9C;">Barrett</h2>
                    <button class="push-btn" data-son="Barrett" data-msg="Miss you dad!">Miss you dad!</button>
                    <button class="push-btn" data-son="Barrett" data-msg="Good morning, Dad!">Good morning, Dad!</button>
                    <button class="push-btn" data-son="Barrett" data-msg="Send us a new pic!">Send us a new pic!</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SECURITY PROTOCOL ---
        const SECRET_KEY = "CJ18BM20ltb";
        
        const urlParams = new URLSearchParams(window.location.search);
        const urlKey = urlParams.get('key');

        if (urlKey === SECRET_KEY) {
            localStorage.setItem('nightingaleAuth', SECRET_KEY);
        }

        if (localStorage.getItem('nightingaleAuth') === SECRET_KEY) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else {
            document.body.innerHTML = "";
            document.body.style.backgroundColor = "black";
        }

        // --- 2. GOOGLE SHEET DATA FETCHING (Main Map) ---
        const SHEET_ID = "1_n0RQwaGF_WxeujBq8Z04NG_ejzK71VhPa7YJE0WmM4";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;

        const HOME_LAT = 35.3871741;
        const HOME_LONG = -84.5345774;

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 3958.8; // miles
            const toRad = deg => deg * Math.PI / 180;
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(1); 
        }

        function convertSerialDate(serial) {
            const epoch = new Date(1899, 11, 30); 
            return new Date(epoch.getTime() + serial * 24 * 60 * 60 * 1000);
        }

        function parseSheetDate(sheetValue) {
            if (!sheetValue) return null;
            if (typeof sheetValue === "number") return convertSerialDate(sheetValue);
            const [datePart, timePart] = sheetValue.split(" ");
            if (!datePart || !timePart) return null;
            const [month, day, year] = datePart.split("/").map(Number);
            const [hours, minutes, seconds] = timePart.split(":").map(Number);
            return new Date(year, month - 1, day, hours, minutes, seconds);
        }

        function formatUpdated(sheetValue) {
            const d = parseSheetDate(sheetValue);
            if (!d) return "N/A";
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterday = new Date(today);
            yesterday.setDate(today.getDate() - 1);
            const updatedDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());

            if (updatedDate.getTime() === today.getTime()) {
                const hours = d.getHours() % 12 || 12;
                const minutes = d.getMinutes().toString().padStart(2, "0");
                const ampm = d.getHours() >= 12 ? "PM" : "AM";
                return `Today at ${hours}:${minutes} ${ampm}`;
            } else if (updatedDate.getTime() === yesterday.getTime()) {
                return "Yesterday";
            } else {
                const diffTime = today - updatedDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return `${diffDays} day${diffDays > 1 ? "s" : ""} ago`;
            }
        }

        function loadData() {
            fetch(SHEET_URL)
                .then(res => res.text())
                .then(text => {
                    const jsonText = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/s)[1];
                    const table = JSON.parse(jsonText).table;
                    const headers = table.cols.map(c => c.label);
                    const values = table.rows[0].c;

                    const row = {};
                    // FIX: Replaced optional chaining with older fallback for older iPads
                    headers.forEach((h, i) => row[h] = (values[i] && values[i].v) ? values[i].v : "");

                    const mapContainer = document.getElementById('map-container');
                    const sectorStatus = document.querySelector('#mod-sector .status-text');
                    const sectorDate = document.querySelector('#mod-sector .date-text');
                    const sectorSub = document.querySelector('#mod-sector .sub-text');

                    mapContainer.innerHTML = "";
                    sectorDate.innerText = "Updated: " + formatUpdated(row.updated);

                    // -------- FLYING MODE --------
                    if (row.mode === "FLYING" && row.flight_id) {
                        mapContainer.style.display = 'flex';
                        sectorStatus.innerText = "In the Air";
                        sectorSub.innerText = "Flight: " + row.flight_id;
                        sectorStatus.style.color = "#000080"; 

                        const iframe = document.createElement("iframe");
                        iframe.src = `https://www.airnavradar.com/data/flights/${row.flight_id}`;
                        iframe.style.width = "100%";
                        iframe.style.height = "100%";
                        iframe.style.border = "none";
                        mapContainer.appendChild(iframe);
                    } 
                    // -------- GROUND MODE --------
                    else if (row.mode === "GROUND" || row.mode === "Landed") {
                        mapContainer.style.display = 'flex';
                        const distance = haversine(HOME_LAT, HOME_LONG, row.dad_lat, row.dad_long);

                        sectorStatus.innerText = "On the Ground";
                        sectorSub.innerHTML = `In ${row.city}, ${row.state} (${distance} miles away)`;
                        sectorStatus.style.color = "#355E3B"; 

                        const mapDiv = document.createElement("div");
                        mapDiv.id = "map";
                        mapDiv.style.width = "100%";
                        mapDiv.style.height = "100%";
                        mapContainer.appendChild(mapDiv);

                        const map = L.map('map', {zoomControl: false, attributionControl: false});
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19}).addTo(map);

                        L.marker([row.dad_lat, row.dad_long]).addTo(map).bindPopup("Dad").openPopup();
                        L.marker([HOME_LAT, HOME_LONG]).addTo(map).bindPopup("Home").openPopup();
                        L.polyline([[HOME_LAT, HOME_LONG], [row.dad_lat, row.dad_long]], {color: 'blue'}).addTo(map);

                        const dadHomeBounds = L.latLngBounds([[HOME_LAT, HOME_LONG], [row.dad_lat, row.dad_long]]);
                        map.fitBounds(dadHomeBounds, {padding: [40, 40], maxZoom: 7});
                    }
                    // -------- HOME MODE --------
                    else if (row.mode === "HOME") {
                        mapContainer.style.display = 'none'; // Hides the map portion cleanly
                        sectorStatus.innerText = "Home";
                        sectorSub.innerText = "Safe and sound."; 
                        sectorStatus.style.color = "#333"; 
                    }
                })
                .catch(err => console.error("Error fetching map data:", err));
        }

        loadData();
        setInterval(loadData, 60000);

        // --- 3. COUNTDOWN TIMERS FETCHING ---
        const SLEEPS_SHEET_ID = "1hTgmLdIhX1tVZbI2YB1tExCTreIAgHSqN8i31zURNkg";
        const SLEEPS_URL = `https://docs.google.com/spreadsheets/d/${SLEEPS_SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;

        function calculateSleeps(targetDateStr) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(targetDateStr);
            target.setHours(0, 0, 0, 0);
            const diffTime = target - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function loadSleeps() {
            fetch(SLEEPS_URL)
                .then(res => res.text())
                .then(text => {
                    const jsonText = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/s)[1];
                    const table = JSON.parse(jsonText).table;
                    const rows = table.rows;

                    const container = document.getElementById('sleeps-list-container');
                    container.innerHTML = ""; 

                    rows.forEach(row => {
                        const eventName = (row.c[0] && row.c[0].v) ? row.c[0].v : "";
                        const dateValue = (row.c[1]) ? (row.c[1].f || row.c[1].v) : null;

                        if (eventName && dateValue) {
                            let parsedDate = null;
                            
                            if (typeof dateValue === 'string' && dateValue.startsWith('Date')) {
                                let parts = dateValue.match(/Date\((\d+),\s*(\d+),\s*(\d+)/);
                                if (parts) {
                                    parsedDate = new Date(parts[1], parts[2], parts[3]);
                                }
                            } else if (typeof dateValue === 'number') {
                                parsedDate = convertSerialDate(dateValue);
                            } else {
                                parsedDate = new Date(dateValue);
                            }
                            
                            if (parsedDate && !isNaN(parsedDate)) {
                                const sleeps = calculateSleeps(parsedDate);
                                
                                if (sleeps >= 0) {
                                    const li = document.createElement('li');
                                    
                                    // If it's today, use the green styles and emoji!
                                    if (sleeps === 0) {
                                        li.classList.add('today-row');
                                        li.innerHTML = `<span class="event-name">${eventName}</span> 
                                                        <span class="sleep-number today-text">TODAY! 🎉</span>`;
                                    } 
                                    // Otherwise, just show the standard black number
                                    else {
                                        li.innerHTML = `<span class="event-name">${eventName}</span> 
                                                        <span class="sleep-number">${sleeps}</span>`;
                                    }
                                    
                                    container.appendChild(li);
                                }
                            }
                        }
                    });
                    
                    if (container.innerHTML === "") {
                        container.innerHTML = '<li><span class="event-name">No upcoming events</span></li>';
                    }
                })
                .catch(err => {
                    console.error("Error fetching sleeps data:", err);
                    document.getElementById('sleeps-list-container').innerHTML = 
                        '<li><span class="event-name" style="color:red; font-size:0.9rem;">Connection error. Is the sheet Published to the Web?</span></li>';
                });
        }

        loadSleeps();
        setInterval(loadSleeps, 3600000);

        // --- 4. MESSAGE BOARD & PUSH NOTIFICATIONS ---
        const MESSAGE_CSV_URL = `https://docs.google.com/spreadsheets/d/1ALWIcL9eQV7SEoXm0xoP9lz_1XfhtLmJAUZtm4Pn6ig/gviz/tq?tqx=out:csv&headers=0`;
        const NTFY_TOPIC = "dad_trackeralertsnotify__44";

        function loadMessage() {
            fetch(MESSAGE_CSV_URL)
                .then(res => res.text())
                .then(text => {
                    const cleanMessage = text.replace(/^"|"$/g, '').trim();
                    const msgElement = document.getElementById('message-text');
                    const storedMessage = localStorage.getItem('dashboardMessage');
                    
                    // Grab the container holding the boys' buttons
                    const btnContainer = document.querySelector('.btn-container');

                    const btnCarter = document.getElementById('btn-carter');
                    const btnBarrett = document.getElementById('btn-barrett');

                    function resetButtons() {
                        btnCarter.classList.remove('seen');
                        btnCarter.innerText = 'Carter';
                        localStorage.setItem('carterSeen', 'false');

                        btnBarrett.classList.remove('seen');
                        btnBarrett.innerText = 'Barrett';
                        localStorage.setItem('barrettSeen', 'false');
                    }

                    function restoreButtons() {
                        if (localStorage.getItem('carterSeen') === 'true') {
                            btnCarter.classList.add('seen');
                            btnCarter.innerText = '✔ Carter';
                        }
                        if (localStorage.getItem('barrettSeen') === 'true') {
                            btnBarrett.classList.add('seen');
                            btnBarrett.innerText = '✔ Barrett';
                        }
                    }

                    // STATE 1: Brand new message from Dad!
                    if (cleanMessage !== storedMessage && cleanMessage !== "") {
                        msgElement.innerText = cleanMessage;
                        btnContainer.style.display = 'flex'; // Show the buttons
                        localStorage.setItem('dashboardMessage', cleanMessage);
                        resetButtons(); 
                    } 
                    // STATE 2: The message hasn't changed (iPad refreshed)
                    else if (cleanMessage === storedMessage && cleanMessage !== "") {
                        msgElement.innerText = cleanMessage;
                        btnContainer.style.display = 'flex'; // Show the buttons
                        restoreButtons(); 
                    } 
                    // STATE 3: The spreadsheet is empty
                    else if (cleanMessage === "") {
                        msgElement.innerText = "No new messages...";
                        btnContainer.style.display = 'none'; // Hide the buttons!
                        
                        if (storedMessage !== "") {
                            localStorage.setItem('dashboardMessage', "");
                            resetButtons();
                        }
                    }
                })
                .catch(err => {
                    console.error("Error fetching message:", err);
                    document.getElementById('message-text').innerText = "No new messages...";
                    document.querySelector('.btn-container').style.display = 'none';
                });
        }
                    function restoreButtons() {
                        if (localStorage.getItem('carterSeen') === 'true') {
                            btnCarter.classList.add('seen');
                            btnCarter.innerText = '✔ Carter';
                        }
                        if (localStorage.getItem('barrettSeen') === 'true') {
                            btnBarrett.classList.add('seen');
                            btnBarrett.innerText = '✔ Barrett';
                        }
                    }

                    if (cleanMessage !== storedMessage && cleanMessage !== "") {
                        msgElement.innerText = cleanMessage;
                        localStorage.setItem('dashboardMessage', cleanMessage);
                        resetButtons(); 
                    } 
                    else if (cleanMessage === storedMessage && cleanMessage !== "") {
                        msgElement.innerText = cleanMessage;
                        restoreButtons(); 
                    } 
                    else if (cleanMessage === "") {
                        msgElement.innerText = "Tap your name to say Hi to Dad!";
                        if (storedMessage !== "") {
                            localStorage.setItem('dashboardMessage', "");
                            resetButtons();
                        } else {
                            restoreButtons(); 
                        }
                    }
                })
                .catch(err => {
                    console.error("Error fetching message:", err);
                    document.getElementById('message-text').innerText = "Tap your name to say Hi to Dad!";
                });
        }

        // Updated Push Function to accept custom messages
        function notifyDad(sonName, customAction) {
            // Give it a fallback just in case
            const actionText = customAction || "just read your message on the dashboard!";
            fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
                method: 'POST',
                body: `${sonName} ${actionText}`,
                headers: {
                    'Title': 'Dad Tracker Alert',
                    'Tags': 'airplane' 
                }
            }).catch(err => console.error("Error sending notification:", err));
        }

        // Dashboard Ack Buttons
        document.getElementById('btn-carter').addEventListener('click', function() {
            if (!this.classList.contains('seen')) {
                this.classList.add('seen');
                this.innerText = '✔ Carter';
                localStorage.setItem('carterSeen', 'true');
                notifyDad('Carter');
            }
        });
        
        document.getElementById('btn-barrett').addEventListener('click', function() {
            if (!this.classList.contains('seen')) {
                this.classList.add('seen');
                this.innerText = '✔ Barrett';
                localStorage.setItem('barrettSeen', 'true');
                notifyDad('Barrett');
            }
        });

        // Toggle Send Message View
        document.getElementById('btn-open-send').addEventListener('click', function() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('send-view').style.display = 'block';
        });

        document.getElementById('btn-cancel-send').addEventListener('click', function() {
            document.getElementById('send-view').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        });

        // The Custom Message Buttons
        document.querySelectorAll('.push-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const son = this.getAttribute('data-son');
                const msg = this.getAttribute('data-msg');

                // Send the specific push
                notifyDad(son, `says: "${msg}"`);

                // Visual Confirmation
                const originalText = this.innerText;
                const originalBg = this.style.backgroundColor;
                const originalColor = this.style.color;

                this.innerText = '✔ Sent!';
                this.style.backgroundColor = '#4CAF50';
                this.style.color = 'white';

                // Wait 2 seconds, then reset and go back
                setTimeout(function() {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = originalBg;
                    btn.style.color = originalColor;
                    
                    document.getElementById('send-view').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                }, 2000);
            });
        });

        loadMessage();
        setInterval(loadMessage, 60000);

        // --- 5. POSTCARD AUTO-PULL ---
        const POSTCARD_WEB_APP = "https://script.google.com/macros/s/AKfycbwGK-qpY-f36QDunT-n7cJhJQnjyOC_wCof_eHH7If2tGRrwe9dcnk-euAQa3GmX1MQoQ/exec";

        function loadPostcard() {
            fetch(POSTCARD_WEB_APP)
                .then(res => res.text())
                .then(fileId => {
                    const imgElement = document.getElementById('postcard-img');
                    const placeholder = document.getElementById('postcard-placeholder');
                    const currentId = localStorage.getItem('postcardId');

                    if (fileId !== "NO_FILES" && (fileId !== currentId || imgElement.getAttribute('src') === "")) {
                        imgElement.src = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
                        imgElement.onload = function() {
                            imgElement.style.display = 'block';
                            placeholder.style.display = 'none';
                        };
                        localStorage.setItem('postcardId', fileId);
                    }
                })
                .catch(err => console.error("Error fetching postcard:", err));
        }

        loadPostcard();
        setInterval(loadPostcard, 60000);
        
    </script>
</body>
</html>
